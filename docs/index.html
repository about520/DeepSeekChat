<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>DeepSeek AI</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DeepSeek AI">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f5f7">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

<style>
  :root {
    --ios-bg: #f5f5f7;
    --ios-blue: #007aff;
    --bili-pink: #fb7299;
    --text-primary: #1d1d1f;
    --text-secondary: #86868b;
    --border: #d1d1d6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    background: var(--ios-bg);
    height: 100vh; width: 100vw;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ===== Tab 栏 ===== */
  .tab-bar {
    display: flex;
    background: rgba(255,255,255,.72);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab-btn {
    flex: 1;
    padding: 13px 0;
    font-size: 15px; font-weight: 500;
    color: var(--text-secondary);
    background: none; border: none;
    cursor: pointer;
    position: relative;
    transition: color .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn.active {
    color: var(--ios-blue);
  }
  .tab-btn.active::after {
    content: '';
    position: absolute; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 28px; height: 3px;
    border-radius: 3px;
    background: var(--ios-blue);
  }
  .tab-btn:nth-child(2).active {
    color: var(--bili-pink);
  }
  .tab-btn:nth-child(2).active::after {
    background: var(--bili-pink);
  }

  /* ===== 面板容器 ===== */
  .panel-container {
    flex: 1; position: relative;
    overflow: hidden;
  }
  .panel {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .panel.active { opacity: 1; pointer-events: auto; }

  /* ===== AI 面板 ===== */
  .api-key-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    background: #fff; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .api-key-row input {
    flex:1; padding: 8px 12px; font-size: 13px;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--ios-bg); outline: none;
  }
  .api-key-row input:focus { border-color: var(--ios-blue); }
  .api-key-row button {
    padding: 8px 16px; font-size: 13px; font-weight: 500;
    border: none; border-radius: 10px;
    background: var(--ios-blue); color: #fff; cursor: pointer;
    white-space: nowrap;
  }
  .chat-area {
    flex:1; overflow-y:auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: #c1c1c6; border-radius: 10px; }

  .message {
    max-width: 80%; padding: 10px 15px;
    font-size: 15px; line-height: 1.45;
    border-radius: 18px;
    animation: msgIn .25s ease-out;
    word-break: break-word;
  }
  @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .message.user {
    align-self: flex-end;
    background: var(--ios-blue); color: #fff;
    border-bottom-right-radius: 6px;
  }
  .message.ai {
    align-self: flex-start;
    background: #e9e9eb; color: var(--text-primary);
    border-bottom-left-radius: 6px;
  }
  .message.ai pre {
    background: #1c1c1e; color: #e0e0e0; padding: 12px;
    border-radius: 10px; overflow-x: auto; margin-top: 6px;
    font-size: 13px; line-height: 1.4;
  }
  .message.ai code { font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; }

  .input-area {
    padding: 12px 16px;
    background: rgba(255,255,255,.72);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-end;
    flex-shrink: 0;
  }
  .input-area textarea {
    flex:1; padding: 10px 14px; font-size: 15px;
    border: 1px solid var(--border); border-radius: 20px;
    background: #fff; outline: none; resize: none;
    max-height: 120px; line-height: 1.4;
    font-family: inherit;
  }
  .input-area textarea:focus { border-color: var(--ios-blue); }
  .input-area textarea::placeholder { color: #c7c7cc; }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--ios-blue); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .send-btn:active { opacity: .8; }
  .send-btn svg { width: 18px; height: 18px; fill: #fff; }
  .send-btn:disabled { background: #a1a1a6; }

  .typing-indicator {
    align-self: flex-start;
    background: #e9e9eb; border-radius: 18px;
    border-bottom-left-radius: 6px;
    padding: 13px 16px;
    display: flex; gap: 5px;
  }
  .typing-indicator span {
    width: 7px; height: 7px; border-radius: 50%;
    background: #98989d; animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: .15s; }
  .typing-indicator span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-8px); } }

  /* ===== B站面板 ===== */
  .bili-frame-wrap {
    flex:1; position: relative; background: #f6f7f8;
  }
  .bili-frame-wrap iframe {
    width: 100%; height: 100%; border: none;
  }
  .bili-frame-wrap .blocked-hint {
    display: none;
    position: absolute; inset:0;
    background: #f6f7f8;
    flex-direction: column; align-items: center; justify-content: center;
    color: #9499a0; font-size: 14px; gap: 8px;
  }
  .bili-frame-wrap .blocked-hint.show { display: flex; }
</style>
</head>
<body>

<!-- Tab 栏 -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('ai')">AI 助手</button>
  <button class="tab-btn" onclick="switchTab('bili')">哔哩哔哩</button>
</div>

<div class="panel-container">
  <!-- AI 面板 -->
  <div class="panel active" id="panel-ai">
    <div class="api-key-row">
      <input type="password" id="apiKeyInput" placeholder="输入 DeepSeek API Key（sk-...）" autocomplete="off">
      <button onclick="setApiKey()">设置</button>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="message ai">你好，我是 DeepSeek AI。输入 API Key 后即可开始对话。</div>
    </div>
    <div class="input-area">
      <textarea id="userInput" rows="1" placeholder="输入消息..." onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- B站面板 -->
  <div class="panel" id="panel-bili">
    <div class="bili-frame-wrap">
      <iframe id="biliFrame" src="about:blank" allowfullscreen="true" allow="fullscreen; autoplay; encrypted-media; picture-in-picture" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-top-navigation allow-presentation"></iframe>
      <div class="blocked-hint" id="blockedHint">
        <span>哔哩哔哩可能禁止嵌入</span>
        <a href="https://www.bilibili.com" target="_blank" style="color:#fb7299;">在浏览器中打开 →</a>
      </div>
    </div>
  </div>
</div>

<script>
  const chatArea = document.getElementById('chatArea');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const apiKeyInput = document.getElementById('apiKeyInput');
  const biliFrame = document.getElementById('biliFrame');
  const blockedHint = document.getElementById('blockedHint');

  let apiKey = localStorage.getItem('ds_api_key') || '';
  let messages = [];
  let biliLoaded = false;

  if (apiKey) {
    apiKeyInput.value = apiKey;
    sendBtn.disabled = false;
  }

  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.classList.toggle('active', (name==='ai' && i===0) || (name==='bili' && i===1));
    });
    document.getElementById('panel-ai').classList.toggle('active', name==='ai');
    document.getElementById('panel-bili').classList.toggle('active', name==='bili');
    // 首次切换到B站时加载
    if (name==='bili' && !biliLoaded) {
      biliFrame.src = 'https://www.bilibili.com';
      biliLoaded = true;
    }
  }

  biliFrame.onerror = () => blockedHint.classList.add('show');

  function setApiKey() {
    const key = apiKeyInput.value.trim();
    if (!key) return;
    apiKey = key;
    localStorage.setItem('ds_api_key', key);
    sendBtn.disabled = false;
    addMessage('ai', 'API Key 已设置 ✓');
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || !apiKey) return;

    addMessage('user', text);
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    messages.push({ role: 'user', content: text });

    try {
      const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'deepseek-chat',
          messages: messages,
          stream: false
        })
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const msg = err.error?.message || `请求失败 (${res.status})`;
        addMessage('ai', `错误：${msg}`);
      } else {
        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || '（无响应）';
        messages.push({ role: 'assistant', content: reply });
        addMessage('ai', reply);
      }
    } catch(e) {
      removeTyping();
      addMessage('ai', `网络错误：${e.message}`);
    }
    sendBtn.disabled = false;
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\n/g, '<br>');
    div.innerHTML = text;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
